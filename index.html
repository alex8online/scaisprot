<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PZ8 Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --primary: #ff1744;
            --primary-dark: #c41c3b;
            --secondary: #6366f1;
            --accent: #0ea5e9;
            --bg-dark: #0f0f1e;
            --bg-darker: #090912;
            --bg-card: rgba(20, 20, 35, 0.7);
            --bg-card-hover: rgba(25, 25, 45, 0.9);
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.15);
            --text-primary: #ffffff;
            --text-secondary: #b0b8c1;
            --text-muted: #6b7280;
            --glass: blur(25px);
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-darker);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            letter-spacing: 0.3px;
        }

        /* ═══ BACKGROUND EFFECTS ═══ */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            background: radial-gradient(circle at 20% 50%, rgba(255, 23, 68, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(99, 102, 241, 0.08) 0%, transparent 50%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image: 
                url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        /* ═══ HEADER / NAVBAR ═══ */
        .header {
            position: sticky;
            top: 0;
            z-index: 200;
            background: rgba(9, 9, 18, 0.8);
            backdrop-filter: var(--glass);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 2rem;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 1rem;
            text-decoration: none;
            flex-shrink: 0;
        }

        .brand-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.3rem;
            color: white;
            box-shadow: 0 8px 24px rgba(255, 23, 68, 0.3);
            position: relative;
            overflow: hidden;
        }

        .brand-icon::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(255, 255, 255, 0.1) 50%, transparent 70%);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .brand-text {
            display: flex;
            flex-direction: column;
            gap: 0.1rem;
        }

        .brand-title {
            font-size: 1.5rem;
            font-weight: 900;
            color: white;
            letter-spacing: 1px;
        }

        .brand-subtitle {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ═══ NAV TABS ═══ */
        .nav-tabs {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex: 1;
            overflow-x: auto;
            scrollbar-width: none;
            padding: 0 1rem;
        }

        .nav-tabs::-webkit-scrollbar {
            display: none;
        }

        .nav-tab {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.7rem 1.4rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 50px;
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .nav-tab i {
            font-size: 1.2rem;
        }

        .nav-tab:hover {
            background: rgba(255, 23, 68, 0.1);
            border-color: var(--border-hover);
            color: var(--text-primary);
            transform: translateY(-2px);
        }

        .nav-tab.active {
            background: linear-gradient(135deg, rgba(255, 23, 68, 0.25), rgba(99, 102, 241, 0.15));
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: 0 0 20px rgba(255, 23, 68, 0.2);
        }

        .nav-tab.active::before {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 50px;
        }

        /* ═══ SEARCH BAR ═══ */
        .search-box {
            position: relative;
            flex-shrink: 0;
        }

        .search-box input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 0.8rem 1.2rem 0.8rem 2.8rem;
            color: var(--text-primary);
            font-size: 0.95rem;
            width: 220px;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .search-box input::placeholder {
            color: var(--text-muted);
        }

        .search-box input:focus {
            outline: none;
            width: 280px;
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
        }

        .search-box i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.1rem;
            pointer-events: none;
        }

        /* ═══ HERO / PLAYER SECTION ═══ */
        .hero {
            position: relative;
            z-index: 1;
            max-width: 1700px;
            margin: 0 auto;
            padding: 2.5rem 2rem;
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 2rem;
            align-items: start;
        }

        /* Player */
        .player-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .channel-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.7rem;
            background: linear-gradient(135deg, rgba(255, 23, 68, 0.2), rgba(99, 102, 241, 0.15));
            border: 1px solid var(--primary);
            border-radius: 50px;
            padding: 0.6rem 1.2rem;
            width: fit-content;
        }

        .live-indicator {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--primary);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 12px var(--primary); }
            50% { opacity: 0.5; box-shadow: 0 0 24px var(--primary); }
        }

        .channel-badge-text {
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--primary);
        }

        .player-title {
            font-size: 2.8rem;
            font-weight: 900;
            color: var(--text-primary);
            background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
        }

        .player-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: var(--bg-darker);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(255, 23, 68, 0.15), 0 0 0 1px var(--border);
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .player-wrap::before {
            content: '';
            position: absolute;
            inset: 0;
            z-index: 3;
            pointer-events: none;
            box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.6);
            border-radius: 20px;
        }

        .player-glow {
            position: absolute;
            inset: -20px;
            z-index: 0;
            background: linear-gradient(135deg, rgba(255, 23, 68, 0.2), rgba(99, 102, 241, 0.2));
            filter: blur(80px);
            opacity: 0.6;
            animation: glowPulse 4s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.4; transform: scale(0.95); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }

        .player-loader {
            position: absolute;
            inset: 0;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            background: radial-gradient(circle at 50% 50%, rgba(15, 15, 30, 0.8), rgba(9, 9, 18, 0.95));
            backdrop-filter: var(--glass);
        }

        .loader-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(99, 102, 241, 0.2);
            border-top-color: var(--primary);
            border-right-color: var(--accent);
            border-radius: 50%;
            animation: spin 1.2s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-text {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .player-iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
            background: black;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        /* EPG Bar */
        .epg-container {
            display: none;
            gap: 1.5rem;
        }

        .epg-slot {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }

        .epg-slot:hover {
            border-color: var(--border-hover);
            background: var(--bg-card-hover);
        }

        .epg-tag {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            margin-bottom: 0.8rem;
        }

        .epg-tag.now {
            background: rgba(255, 23, 68, 0.2);
            color: var(--primary);
            border: 1px solid rgba(255, 23, 68, 0.3);
        }

        .epg-tag.next {
            background: rgba(14, 165, 233, 0.2);
            color: var(--accent);
            border: 1px solid rgba(14, 165, 233, 0.3);
        }

        .epg-time {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--text-primary);
            font-family: 'Space Mono', monospace;
            margin-bottom: 0.5rem;
        }

        .epg-title {
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.4;
            max-height: 2.8em;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        /* ═══ SIDEBAR ═══ */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .sidebar-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }

        .sidebar-card:hover {
            border-color: var(--border-hover);
            background: var(--bg-card-hover);
        }

        .sidebar-title {
            font-size: 1rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .sidebar-title i {
            font-size: 1.2rem;
            color: var(--primary);
        }

        .quick-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
        }

        .stat {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--primary);
            display: block;
            margin-bottom: 0.3rem;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ═══ CHANNELS GRID ═══ */
        .section {
            position: relative;
            z-index: 1;
            max-width: 1700px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            animation: slideIn 0.6s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .section-title {
            font-size: 2rem;
            font-weight: 900;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .section-title i {
            font-size: 2.2rem;
            color: var(--primary);
        }

        .section-count {
            background: linear-gradient(135deg, rgba(255, 23, 68, 0.2), rgba(99, 102, 241, 0.15));
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .channels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1rem;
        }

        /* Channel Card */
        .ch-card {
            position: relative;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: cardSlideIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
            group: true;
        }

        @keyframes cardSlideIn {
            from { opacity: 0; transform: translateY(30px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .ch-card:hover {
            border-color: var(--accent);
            background: var(--bg-card-hover);
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(14, 165, 233, 0.2), 0 0 0 1px var(--accent);
        }

        .ch-card.playing {
            border-color: var(--primary);
            background: linear-gradient(135deg, rgba(255, 23, 68, 0.15), rgba(99, 102, 241, 0.1));
            box-shadow: 0 12px 40px rgba(255, 23, 68, 0.25), 0 0 0 2px var(--primary);
        }

        .ch-card.playing:hover {
            box-shadow: 0 24px 50px rgba(255, 23, 68, 0.35), 0 0 0 2px var(--primary);
        }

        .ch-thumb {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(255, 23, 68, 0.05));
            position: relative;
            overflow: hidden;
        }

        .ch-thumb::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .ch-card:hover .ch-thumb::before {
            opacity: 1;
        }

        .ch-thumb-icon {
            font-size: 3.5rem;
            color: rgba(255, 255, 255, 0.2);
            transition: all 0.4s ease;
            z-index: 1;
        }

        .ch-card:hover .ch-thumb-icon {
            color: rgba(14, 165, 233, 0.4);
            transform: scale(1.15) rotateY(-10deg);
        }

        .ch-card.playing .ch-thumb-icon {
            color: rgba(255, 23, 68, 0.5);
        }

        .ch-play-btn {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s ease;
            z-index: 2;
        }

        .ch-card:not(.playing):hover .ch-play-btn {
            opacity: 1;
        }

        .ch-play-btn i {
            font-size: 3rem;
            color: white;
            filter: drop-shadow(0 6px 16px rgba(0, 0, 0, 0.9));
            transition: all 0.3s ease;
        }

        .ch-card:not(.playing):hover .ch-play-btn i {
            transform: scale(1.2);
        }

        .ch-playing-overlay {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .ch-card.playing .ch-playing-overlay {
            display: flex;
        }

        .eq-bars {
            display: flex;
            align-items: flex-end;
            gap: 4px;
            height: 28px;
        }

        .eq-bar {
            width: 4px;
            background: linear-gradient(180deg, var(--accent), var(--primary));
            border-radius: 3px;
            animation: eqBounce 0.8s ease-in-out infinite alternate;
        }

        .eq-bar:nth-child(1) { height: 10px; animation-delay: 0s; }
        .eq-bar:nth-child(2) { height: 20px; animation-delay: 0.1s; }
        .eq-bar:nth-child(3) { height: 14px; animation-delay: 0.2s; }
        .eq-bar:nth-child(4) { height: 22px; animation-delay: 0.1s; }
        .eq-bar:nth-child(5) { height: 12px; animation-delay: 0.15s; }

        @keyframes eqBounce {
            0% { transform: scaleY(0.3); }
            100% { transform: scaleY(1); }
        }

        .ch-body {
            padding: 1rem;
        }

        .ch-name {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.6rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.3;
        }

        .ch-epg {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .ch-epg-time {
            color: var(--accent);
            font-weight: 700;
            font-family: 'Space Mono', monospace;
            flex-shrink: 0;
        }

        .ch-epg-title {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Skeleton Loading */
        .ch-card.skeleton {
            cursor: default;
            pointer-events: none;
        }

        .skel {
            background: rgba(255, 255, 255, 0.04);
            background-image: linear-gradient(90deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.1) 40%, rgba(255, 255, 255, 0.15) 50%, rgba(255, 255, 255, 0) 100%);
            background-size: 200% 100%;
            animation: shimmer 1.6s infinite;
            border-radius: 8px;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .skel-thumb {
            height: 120px;
            border-radius: 0;
        }

        .skel-name {
            height: 14px;
            width: 75%;
            margin-bottom: 10px;
        }

        .skel-sub {
            height: 11px;
            width: 55%;
        }

        /* ═══ RESPONSIVE ═══ */
        @media (max-width: 1200px) {
            .hero {
                grid-template-columns: 1fr;
            }

            .player-title {
                font-size: 2.2rem;
            }

            .channels-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            }

            .section-title {
                font-size: 1.6rem;
            }
        }

        @media (max-width: 900px) {
            .header {
                padding: 0.8rem 1.5rem;
                gap: 1rem;
            }

            .brand-title {
                font-size: 1.2rem;
            }

            .brand-subtitle {
                display: none;
            }

            .nav-tabs {
                padding: 0 0.5rem;
                flex: 1;
            }

            .nav-tab {
                padding: 0.6rem 1rem;
                font-size: 0.85rem;
            }

            .search-box input {
                width: 180px;
            }

            .search-box input:focus {
                width: 230px;
            }

            .hero {
                padding: 1.5rem 1rem;
            }

            .player-title {
                font-size: 1.8rem;
            }

            .section {
                padding: 2rem 1rem;
            }

            .channels-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 0.8rem;
            }

            .ch-thumb {
                height: 100px;
            }

            .ch-thumb-icon {
                font-size: 2.8rem;
            }
        }

        @media (max-width: 640px) {
            .header {
                flex-wrap: wrap;
                padding: 0.8rem 1rem;
            }

            .brand-text {
                display: none;
            }

            .nav-tabs {
                width: 100%;
                order: 3;
                padding: 0.5rem 0;
                margin-top: 0.5rem;
            }

            .search-box {
                order: 2;
            }

            .search-box input {
                width: 100%;
            }

            .search-box input:focus {
                width: 100%;
            }

            .channels-grid {
                grid-template-columns: repeat(3, 1fr);
            }

            .sidebar {
                display: none;
            }

            .section-title {
                font-size: 1.3rem;
            }

            .player-title {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>

<!-- Header -->
<header class="header">
    <a class="header-brand" href="#">
        <div class="brand-icon">PZ8</div>
        <div class="brand-text">
            <div class="brand-title">PZ8</div>
            <div class="brand-subtitle">Premium</div>
        </div>
    </a>

    <div class="nav-tabs" id="nav-tabs"></div>

    <div class="search-box">
        <i class="ph ph-magnifying-glass"></i>
        <input type="text" id="search-input" placeholder="Cerca canale...">
    </div>
</header>

<!-- Hero / Player Section -->
<div class="hero">
    <div class="player-section">
        <div class="channel-badge">
            <div class="live-indicator"></div>
            <span class="channel-badge-text">In trasmissione</span>
        </div>

        <h1 class="player-title" id="current-ch-name">Seleziona un canale</h1>

        <div class="player-wrap" id="player-wrapper">
            <div class="player-glow"></div>
            <div class="player-loader" id="player-loader">
                <div class="loader-spinner"></div>
                <div class="loader-text">CARICAMENTO FLUSSO</div>
            </div>
            <iframe id="main-video-frame" class="player-iframe" src="about:blank"
                allowfullscreen allow="autoplay; encrypted-media"></iframe>
        </div>

        <div class="epg-container" id="epg-bottom-bar">
            <div class="epg-slot">
                <div class="epg-tag now">
                    <i class="ph ph-play-circle"></i> In onda ora
                </div>
                <div class="epg-time" id="epg-now-time">--:--</div>
                <div class="epg-title" id="epg-now-title">Caricamento...</div>
            </div>
            <div class="epg-slot">
                <div class="epg-tag next">
                    <i class="ph ph-clock"></i> A seguire
                </div>
                <div class="epg-time" id="epg-next-time">--:--</div>
                <div class="epg-title" id="epg-next-title">...</div>
            </div>
        </div>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-card">
            <div class="sidebar-title">
                <i class="ph ph-lightning-charge"></i>
                Quick Stats
            </div>
            <div class="quick-stats">
                <div class="stat">
                    <span class="stat-number" id="stat-channels">--</span>
                    <span class="stat-label">Canali</span>
                </div>
                <div class="stat">
                    <span class="stat-number">4K</span>
                    <span class="stat-label">Max</span>
                </div>
                <div class="stat">
                    <span class="stat-number">✓</span>
                    <span class="stat-label">Premium</span>
                </div>
                <div class="stat">
                    <span class="stat-number" id="stat-live">0</span>
                    <span class="stat-label">Live</span>
                </div>
            </div>
        </div>

        <div class="sidebar-card">
            <div class="sidebar-title">
                <i class="ph ph-info"></i>
                Info
            </div>
            <p style="font-size: 0.85rem; color: var(--text-secondary); line-height: 1.6;">
                Accedi a tutti i tuoi canali preferiti in qualità Premium con streaming illimitato.
            </p>
        </div>
    </aside>
</div>

<!-- Channels Grid Section -->
<div class="section">
    <div class="section-header">
        <div class="section-title">
            <i class="ph ph-squares-four" id="section-icon"></i>
            <span id="section-label">Tutti i canali</span>
        </div>
        <span class="section-count" id="section-count"></span>
    </div>
    <div class="channels-grid" id="channels-grid"></div>
</div>

<script>
    /* ── DATA ── */
    const db = {
        sport: [
            { n: "Sky Sport 24", u: "SPORT24" },
            { n: "Sky Sport Uno", u: "SPORTUNO" },
            { n: "Sky Sport Calcio", u: "sportcalcio" },
            { n: "Sky Sport Tennis", u: "sporttennis" },
            { n: "Sky Sport F1", u: "sportf1" },
            { n: "Sky Sports F1 4K", u: "sportsf1" },
            { n: "Sky Sport MotoGP", u: "sportmotogp" },
            { n: "Sky Sport Basket", u: "sportbasket" },
            { n: "Sky Sport Arena", u: "arena" },
            { n: "Sky Sport Max", u: "max" },
            { n: "Sky Sport Mix", u: "mix" },
            { n: "Sky Sport Golf", u: "golf" },
            { n: "Sky Sport Legend", u: "legend" },
            { n: "Sky Sport 251", u: "sport251" },
            { n: "Sky Sport 252", u: "sport252" },
            { n: "Sky Sport 253", u: "sport253" },
            { n: "Sky Sport 254", u: "sport254" },
            { n: "Sky Sport 255", u: "sport255" },
            { n: "Sky Sport 256", u: "sport256" },
            { n: "Sky Sport 257", u: "sport257" },
            { n: "Sky Sport 258", u: "sport258" },
            { n: "Sky Sport 259", u: "sport259" }
        ],
        dazn: [
            { n: "Dazn 1 IT", u: "Dazn1_WARP" },
            { n: "Dazn 2 IT", u: "dazn5it" },
            { n: "Dazn 1 PT", u: "dazn1pt" },
            { n: "Dazn 2 PT", u: "dazn2pt" },
            { n: "Dazn 3 PT", u: "dazn3pt" },
            { n: "Dazn 4 PT", u: "dazn4pt" },
            { n: "Dazn 5 PT", u: "dazn5pt" },
            { n: "Eleven Sports 1 PL", u: "elevensport1" },
            { n: "Eleven Sports 2 PL", u: "elevensport2" },
            { n: "Eleven Sports 3 PL", u: "elevensport3" },
            { n: "Eleven Sports 4 PL", u: "elevensport4" },
            { n: "Sport Tv 1", u: "sporttv1" },
            { n: "Sport Tv 2", u: "sporttv2" },
            { n: "Sport Tv 3", u: "sporttv3" },
            { n: "Sport Tv 4", u: "sporttv4" },
            { n: "Sport Tv 5", u: "sporttv5" },
            { n: "Sport Tv 6", u: "sporttv6" },
            { n: "Sport Tv 7", u: "sporttv7" },
            { n: "Tnt Sports 1", u: "tnt" }
        ],
        eurosport: [
            { n: "Eurosport 1", u: "eurosport1" },
            { n: "Eurosport 2", u: "eurosport2" },
            { n: "Eurosport 3", u: "eurosport3" },
            { n: "Eurosport 4", u: "eurosport4" },
            { n: "Eurosport 5", u: "eurosport5" },
            { n: "Eurosport 6", u: "eurosport6" }
        ],
        lba: [
            { n: "LBA TV 1", u: "lbatv1" },
            { n: "LBA TV 2", u: "lbatv2" },
            { n: "LBA TV 3", u: "lbatv3" },
            { n: "LBA TV 4", u: "lbatv4" },
            { n: "LBA TV 5", u: "lbatv5" }
        ],
        entertainment: [
            { n: "Sky TG 24", u: "tg24" },
            { n: "Sky Uno", u: "skyuno" },
            { n: "Sky Atlantic", u: "atlantic" },
            { n: "Sky Serie", u: "serie" },
            { n: "Sky Adventure", u: "adventure" },
            { n: "Sky Arte", u: "arte" },
            { n: "Sky Investigation", u: "investigation" },
            { n: "Sky Crime", u: "crime" },
            { n: "Sky Documentaries", u: "documentaries" },
            { n: "Sky Nature", u: "nature" },
            { n: "MTV", u: "mtv" },
            { n: "Comedy Central", u: "comedy" }
        ],
        cinema: [
            { n: "Sky Cinema Uno", u: "uno" },
            { n: "Sky Cinema Suspense", u: "suspense" },
            { n: "Sky Cinema Drama", u: "drama" },
            { n: "Sky Cinema Action", u: "action" },
            { n: "Sky Cinema Comedy", u: "cinemacomedy" },
            { n: "Sky Cinema Romance", u: "cinemaromance" },
            { n: "Sky Cinema Family", u: "illumination" },
            { n: "Sky Cinema Collection", u: "collection" }
        ]
    };

    const categoryIcons = {
        all: 'ph-squares-four',
        sport: 'ph-soccer-ball',
        dazn: 'ph-play-circle',
        eurosport: 'ph-bicycle',
        lba: 'ph-basketball',
        entertainment: 'ph-popcorn',
        cinema: 'ph-film-strip'
    };

    const categoryNames = {
        all: 'Tutti i canali',
        sport: 'Sky Sport',
        dazn: 'Dazn',
        eurosport: 'Eurosport',
        lba: 'LBA TV',
        entertainment: 'Intrattenimento',
        cinema: 'Cinema'
    };

    let currentUrl = null;
    let currentCategory = 'all';
    let epgData = [];

    /* ── EPG helpers ── */
    function timeToMinutes(t) {
        if (!t || !t.includes(':')) return 0;
        const [h, m] = t.split(':').map(Number);
        return h * 60 + m;
    }

    async function fetchEpgData() {
        try {
            const r = await fetch('guida_tv_sky.json');
            if (r.ok) epgData = await r.json();
        } catch (e) { console.warn('EPG error:', e); }
    }

    function getChannelEpg(channelName) {
        if (!epgData.length) return { now: null, next: null };
        const norm = channelName.toUpperCase();
        const ch = epgData.find(x => x.canale.toUpperCase() === norm);
        if (!ch || !ch.programmi.length) return { now: null, next: null };
        const cur = new Date().getHours() * 60 + new Date().getMinutes();
        let idx = -1;
        for (let i = 0; i < ch.programmi.length; i++) {
            if (timeToMinutes(ch.programmi[i].ora) <= cur) idx = i;
            else break;
        }
        if (idx === -1) idx = 0;
        return { now: ch.programmi[idx], next: ch.programmi[idx + 1] || null };
    }

    function updatePlayerEpg() {
        if (!currentUrl) return;
        const ch = db.all.find(c => c.u === currentUrl);
        if (!ch) return;
        const epg = getChannelEpg(ch.n);
        const bar = document.getElementById('epg-bottom-bar');
        if (!epg.now) { bar.style.display = 'none'; return; }
        bar.style.display = 'flex';
        document.getElementById('epg-now-time').innerText  = epg.now.ora;
        document.getElementById('epg-now-title').innerText = epg.now.titolo;
        if (epg.next) {
            document.getElementById('epg-next-time').innerText  = epg.next.ora;
            document.getElementById('epg-next-title').innerText = epg.next.titolo;
        } else {
            document.getElementById('epg-next-time').innerText  = '--:--';
            document.getElementById('epg-next-title').innerText = 'Dati non disponibili';
        }
    }

    /* ── Render nav tabs ── */
    function renderTabs() {
        const container = document.getElementById('nav-tabs');
        container.innerHTML = '';
        for (const cat in categoryNames) {
            if (!db[cat]) continue;
            const btn = document.createElement('button');
            btn.className = 'nav-tab' + (cat === currentCategory ? ' active' : '');
            btn.innerHTML = `<i class="ph ${categoryIcons[cat]}"></i>${categoryNames[cat]}`;
            btn.onclick = () => selectCategory(cat);
            container.appendChild(btn);
        }
    }

    /* ── Select category ── */
    function selectCategory(cat) {
        currentCategory = cat;
        document.getElementById('section-icon').className = `ph ${categoryIcons[cat]}`;
        document.getElementById('section-label').innerText = categoryNames[cat];
        document.getElementById('search-input').value = '';
        renderTabs();
        renderSkeletons();
        setTimeout(() => { if (currentCategory === cat) renderChannels(); }, 450);
    }

    /* ── Skeleton loading ── */
    function renderSkeletons() {
        const grid = document.getElementById('channels-grid');
        grid.innerHTML = '';
        document.getElementById('section-count').innerText = '';
        for (let i = 0; i < 12; i++) {
            const card = document.createElement('div');
            card.className = 'ch-card skeleton';
            card.innerHTML = `
                <div class="skel skel-thumb"></div>
                <div class="ch-body">
                    <div class="skel skel-name"></div>
                    <div class="skel skel-sub"></div>
                </div>`;
            card.style.animationDelay = Math.min(i * 0.05, 0.5) + 's';
            grid.appendChild(card);
        }
    }

    /* ── Render channel cards ── */
    function renderChannels() {
        const grid = document.getElementById('channels-grid');
        grid.innerHTML = '';
        const channels = db[currentCategory];
        if (!channels) return;

        document.getElementById('section-count').innerText = channels.length + ' canali';

        channels.forEach((ch, i) => {
            const isPlaying = ch.u === currentUrl;
            const epg = getChannelEpg(ch.n);
            const icon = isPlaying ? 'ph-waveform'
                : (categoryIcons[currentCategory] === 'ph-squares-four' ? 'ph-monitor-play' : categoryIcons[currentCategory]);

            const card = document.createElement('div');
            card.className = 'ch-card' + (isPlaying ? ' playing' : '');
            card.style.animationDelay = Math.min(i * 0.04, 0.6) + 's';

            let epgHtml = '';
            if (epg.now) {
                epgHtml = `<span class="ch-epg-time">${epg.now.ora}</span><span class="ch-epg-title">${epg.now.titolo}</span>`;
            } else {
                epgHtml = `<span class="ch-epg-title">Live</span>`;
            }

            card.innerHTML = `
                <div class="ch-thumb">
                    <i class="ph ${icon} ch-thumb-icon"></i>
                    <div class="ch-playing-overlay">
                        <div class="eq-bars">
                            <div class="eq-bar"></div>
                            <div class="eq-bar"></div>
                            <div class="eq-bar"></div>
                            <div class="eq-bar"></div>
                            <div class="eq-bar"></div>
                        </div>
                    </div>
                    <div class="ch-play-btn"><i class="ph ph-play-circle-fill"></i></div>
                </div>
                <div class="ch-body">
                    <div class="ch-name">${ch.n}</div>
                    <div class="ch-epg">${epgHtml}</div>
                </div>`;

            card.onclick = () => playChannel(ch.u, ch.n);
            grid.appendChild(card);

            if (isPlaying) {
                setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 150);
            }
        });
    }

    /* ── Play channel ── */
    function playChannel(url, name) {
        if (currentUrl === url) return;
        currentUrl = url;

        const iframe = document.getElementById('main-video-frame');
        iframe.style.opacity = '0';
        setTimeout(() => {
            iframe.src = `https://www.chilistream.net/live.php?ch=${url}`;
            iframe.onload = () => { iframe.style.opacity = '1'; };
        }, 300);

        document.getElementById('current-ch-name').innerText = name;
        renderChannels();
        updatePlayerEpg();

        if (window.innerWidth <= 900) {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    /* ── Search ── */
    function initSearch() {
        document.getElementById('search-input').addEventListener('input', e => {
            const q = e.target.value.toLowerCase().trim();
            if (!q) { renderChannels(); return; }
            const grid = document.getElementById('channels-grid');
            grid.querySelectorAll('.ch-card').forEach(card => {
                const name = card.querySelector('.ch-name');
                if (!name) return;
                card.style.display = name.innerText.toLowerCase().includes(q) ? '' : 'none';
            });
        });
    }

    /* ── Update stats ── */
    function updateStats() {
        document.getElementById('stat-channels').innerText = db.all.length;
        document.getElementById('stat-live').innerText = '∞';
    }

    /* ── Init ── */
    async function init() {
        db.all = [];
        for (const cat in db) {
            if (cat !== 'all') db.all = db.all.concat(db[cat]);
        }

        updateStats();
        await fetchEpgData();

        setInterval(async () => { await fetchEpgData(); updatePlayerEpg(); }, 60000);
        setInterval(() => { renderChannels(); updatePlayerEpg(); }, 30000);

        renderTabs();
        selectCategory('all');

        if (db.all.length > 0) playChannel(db.all[0].u, db.all[0].n);

        initSearch();
    }

    window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
