<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PZ8 - IPTV Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg-base: #0a0e1a;
            --bg-surface: rgba(15, 20, 35, 0.5);
            --bg-surface-hover: rgba(15, 20, 35, 0.8);
            --border-subtle: rgba(255, 255, 255, 0.08);
            --border-strong: rgba(255, 255, 255, 0.15);
            --accent-primary: #e6004d;
            --accent-secondary: #0066ff;
            --text-primary: #ffffff;
            --text-secondary: #a0aebb;
            --glass-blur: blur(20px);
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 80% 20%, rgba(0, 102, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 10% 80%, rgba(230, 0, 77, 0.05) 0%, transparent 50%);
        }

        /* ===== LAYOUT PRINCIPALE ===== */
        .app-layout {
            display: grid;
            grid-template-columns: auto 1fr;
            grid-template-rows: auto 1fr;
            height: 100vh;
            width: 100vw;
            gap: 0;
        }

        /* ===== HEADER / TOPBAR ===== */
        .top-bar {
            grid-column: 2;
            grid-row: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.5rem;
            background: linear-gradient(180deg, 
                rgba(10, 14, 26, 0.8) 0%, 
                rgba(10, 14, 26, 0.5) 100%);
            backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--border-subtle);
            z-index: 30;
            height: 60px;
        }

        .channel-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex: 1;
            min-width: 0;
        }

        .channel-header-title {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .channel-header-title i {
            font-size: 1.5rem;
            color: var(--accent-primary);
            animation: pulse-icon 2s ease-in-out infinite;
        }

        @keyframes pulse-icon {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .channel-name {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .top-bar-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .control-btn {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.25s ease;
        }

        .control-btn:hover {
            background: rgba(0, 102, 255, 0.15);
            border-color: var(--accent-secondary);
            color: var(--accent-secondary);
            transform: scale(1.05);
        }

        /* ===== LEFT SIDEBAR ===== */
        .sidebar {
            grid-column: 1;
            grid-row: 1 / 3;
            width: 80px;
            background: rgba(10, 14, 26, 0.9);
            backdrop-filter: var(--glass-blur);
            border-right: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            padding: 1.5rem 0.75rem;
            gap: 2rem;
            z-index: 40;
            overflow-y: auto;
            overflow-x: hidden;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar:hover {
            width: 200px;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem;
        }

        .brand-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-lg);
            background: linear-gradient(135deg, var(--accent-secondary), var(--accent-primary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.4rem;
            color: white;
            box-shadow: 0 8px 20px rgba(230, 0, 77, 0.3);
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .sidebar:hover .brand-icon {
            transform: scale(1.05);
        }

        .brand-text {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-left: 0.75rem;
            opacity: 0;
            transition: opacity 0.2s ease;
            white-space: nowrap;
        }

        .sidebar:hover .brand-text {
            opacity: 1;
        }

        .nav-menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex: 1;
            overflow-y: auto;
        }

        .nav-menu::-webkit-scrollbar {
            width: 4px;
        }

        .nav-menu::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }

        .nav-item {
            position: relative;
        }

        .nav-btn {
            width: 100%;
            padding: 0.75rem;
            background: transparent;
            border: none;
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            transition: all 0.2s ease;
            position: relative;
        }

        .nav-btn:hover {
            background: rgba(0, 102, 255, 0.1);
            color: var(--text-primary);
        }

        .nav-btn.active {
            color: var(--accent-primary);
            background: rgba(230, 0, 77, 0.1);
        }

        .nav-btn.active::before {
            content: '';
            position: absolute;
            left: -0.75rem;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 24px;
            background: var(--accent-primary);
            border-radius: 0 2px 2px 0;
            box-shadow: 0 0 10px var(--accent-primary);
        }

        .nav-label {
            opacity: 0;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-left: 0.75rem;
            white-space: nowrap;
            transition: opacity 0.2s ease;
        }

        .sidebar:hover .nav-label {
            opacity: 1;
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            grid-column: 2;
            grid-row: 2;
            display: grid;
            grid-template-columns: 1fr 320px;
            grid-template-rows: 1fr auto;
            gap: 1rem;
            padding: 1rem;
            overflow: hidden;
        }

        /* ===== PLAYER SECTION ===== */
        .player-section {
            grid-column: 1;
            grid-row: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            background: linear-gradient(135deg, 
                rgba(0, 102, 255, 0.05) 0%, 
                rgba(230, 0, 77, 0.05) 100%);
            border-radius: var(--radius-xl);
            border: 1px solid var(--border-subtle);
            overflow: hidden;
        }

        .player-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .player-glow {
            position: absolute;
            inset: -50%;
            background: radial-gradient(circle, 
                rgba(0, 102, 255, 0.15) 0%,
                rgba(230, 0, 77, 0.1) 100%);
            filter: blur(80px);
            opacity: 0.5;
            animation: glow-pulse 4s ease-in-out infinite alternate;
            pointer-events: none;
        }

        @keyframes glow-pulse {
            0% { opacity: 0.3; transform: scale(1); }
            100% { opacity: 0.6; transform: scale(1.1); }
        }

        .player-loader {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            background: radial-gradient(circle at 50%, 
                rgba(15, 20, 35, 0.8), 
                rgba(0, 0, 0, 0.95));
            z-index: 2;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(0, 102, 255, 0.15);
            border-top-color: var(--accent-secondary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-text {
            font-size: 0.9rem;
            color: var(--text-secondary);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        iframe.active {
            opacity: 1;
        }

        /* ===== EPG / INFO SECTION ===== */
        .epg-section {
            grid-column: 1;
            grid-row: 2;
            display: flex;
            gap: 1rem;
            background: linear-gradient(180deg, 
                rgba(15, 20, 35, 0.4) 0%, 
                rgba(10, 14, 26, 0.6) 100%);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-xl);
            padding: 1rem;
            animation: slideInUp 0.4s ease;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .epg-item {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            transition: all 0.3s ease;
        }

        .epg-item:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: var(--border-strong);
        }

        .epg-item.live {
            border-color: rgba(230, 0, 77, 0.3);
            background: rgba(230, 0, 77, 0.05);
        }

        .epg-icon {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-md);
            background: rgba(0, 102, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--accent-secondary);
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .epg-item.live .epg-icon {
            background: rgba(230, 0, 77, 0.2);
            color: var(--accent-primary);
            animation: pulse-glow 1.5s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: none; }
            50% { box-shadow: 0 0 12px rgba(230, 0, 77, 0.5); }
        }

        .epg-content {
            flex: 1;
            min-width: 0;
        }

        .epg-time {
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 0.25rem;
        }

        .epg-item.live .epg-time {
            color: var(--accent-primary);
        }

        .epg-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ===== CHANNELS SIDEBAR (RIGHT) ===== */
        .channels-sidebar {
            grid-column: 2;
            grid-row: 1 / 3;
            display: flex;
            flex-direction: column;
            background: var(--bg-surface);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-xl);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            animation: slideInLeft 0.4s ease;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: right center;
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        body.channels-hidden .channels-sidebar {
            width: 0;
            opacity: 0;
            margin-right: -1rem;
            transform: translateX(50px) scale(0.95);
            pointer-events: none;
            border-color: transparent;
            box-shadow: none;
        }

        .channels-header {
            padding: 1rem;
            border-bottom: 1px solid var(--border-subtle);
            background: rgba(0, 0, 0, 0.2);
            flex-shrink: 0;
        }

        .channels-title {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }

        .channels-title i {
            font-size: 1.4rem;
            color: var(--accent-secondary);
        }

        .channels-title h3 {
            font-size: 1rem;
            font-weight: 700;
        }

        .channels-search {
            position: relative;
        }

        .search-input {
            width: 100%;
            background: rgba(0, 102, 255, 0.08);
            border: 1px solid rgba(0, 102, 255, 0.2);
            border-radius: var(--radius-md);
            padding: 0.6rem 0.8rem 0.6rem 2.2rem;
            color: var(--text-primary);
            font-size: 0.9rem;
            transition: all 0.25s ease;
        }

        .search-input::placeholder {
            color: var(--text-secondary);
            opacity: 0.7;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-secondary);
            background: rgba(0, 102, 255, 0.12);
            box-shadow: 0 0 0 3px rgba(0, 102, 255, 0.15);
        }

        .search-icon {
            position: absolute;
            left: 0.8rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent-secondary);
            font-size: 1.1rem;
        }

        .channels-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .channels-list::-webkit-scrollbar {
            width: 5px;
        }

        .channels-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .channels-list::-webkit-scrollbar-thumb {
            background: rgba(0, 102, 255, 0.25);
            border-radius: 2px;
        }

        .channels-list::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 102, 255, 0.5);
        }

        .channel-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.7rem 0.8rem;
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .channel-item:hover {
            background: rgba(0, 102, 255, 0.1);
            border-color: rgba(0, 102, 255, 0.2);
            transform: translateX(4px);
        }

        .channel-item.active {
            background: linear-gradient(90deg, 
                rgba(230, 0, 77, 0.2) 0%, 
                rgba(230, 0, 77, 0.05) 100%);
            border-color: rgba(230, 0, 77, 0.3);
            box-shadow: 0 2px 12px rgba(230, 0, 77, 0.1);
        }

        .channel-icon {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-md);
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--text-secondary);
            flex-shrink: 0;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .channel-item:hover .channel-icon {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
        }

        .channel-item.active .channel-icon {
            background: var(--accent-primary);
            color: white;
            box-shadow: 0 0 12px rgba(230, 0, 77, 0.4);
            border: none;
        }

        .channel-info {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .channel-name {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .channel-status {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .channel-item.active .channel-status {
            color: var(--accent-primary);
        }

        .status-dots {
            display: flex;
            align-items: center;
            gap: 1px;
            height: 8px;
        }

        .dot {
            width: 2px;
            height: 100%;
            background: currentColor;
            border-radius: 1px;
            animation: wave 0.8s ease-in-out infinite;
        }

        .dot:nth-child(2) { animation-delay: 0.1s; }
        .dot:nth-child(3) { animation-delay: 0.2s; }

        @keyframes wave {
            0%, 100% { height: 30%; opacity: 0.6; }
            50% { height: 100%; opacity: 1; }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1400px) {
            .sidebar:hover {
                width: 150px;
            }

            .channels-sidebar {
                width: 280px;
            }
        }

        @media (max-width: 1200px) {
            .main-content {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr auto auto;
            }

            .channels-sidebar {
                grid-column: 1;
                grid-row: 3;
                height: 240px;
            }

            .epg-section {
                flex-direction: column;
            }
        }

        @media (max-width: 768px) {
            .app-layout {
                grid-template-columns: 1fr;
                grid-template-rows: 60px 1fr;
            }

            .sidebar {
                grid-column: 1;
                grid-row: 1;
                width: 100%;
                height: auto;
                flex-direction: row;
                padding: 0.75rem 1rem;
                gap: 1rem;
                border-right: none;
                border-bottom: 1px solid var(--border-subtle);
            }

            .sidebar:hover {
                width: 100%;
            }

            .sidebar-brand {
                margin-right: 1rem;
                flex-shrink: 0;
            }

            .nav-menu {
                flex-direction: row;
                overflow-x: auto;
                overflow-y: hidden;
                flex: 1;
            }

            .nav-btn.active::before {
                display: none;
            }

            .nav-label {
                display: none;
            }

            .top-bar {
                display: none;
            }

            .main-content {
                padding: 0.75rem;
                gap: 0.75rem;
            }

            .channels-sidebar {
                height: 200px;
                width: 100%;
            }

            .epg-section {
                flex-direction: column;
                gap: 0.5rem;
                padding: 0.75rem;
            }

            .epg-item {
                padding: 0.75rem;
            }
        }

        @media (max-width: 500px) {
            .channel-header-title {
                flex-direction: column;
                gap: 0.25rem;
            }

            .channel-name {
                font-size: 1rem;
            }

            .epg-item {
                flex-direction: column;
                align-items: flex-start;
                text-align: left;
            }

            .channels-list {
                padding: 0.25rem;
                gap: 0.3rem;
            }

            .channel-item {
                padding: 0.6rem;
            }
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .fade-in {
            animation: fadeIn 0.3s ease;
        }

        /* ===== SKELETON LOADING ===== */
        .skeleton {
            background: linear-gradient(90deg,
                rgba(255, 255, 255, 0.05) 0%,
                rgba(255, 255, 255, 0.1) 20%,
                rgba(255, 255, 255, 0.05) 40%,
                rgba(255, 255, 255, 0.05) 100%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-channel {
            height: 48px;
            border-radius: var(--radius-md);
        }

        .skeleton-text {
            height: 12px;
            border-radius: 4px;
            margin-bottom: 0.5rem;
        }

        /* ===== UTILITIES ===== */
        .hidden {
            display: none !important;
        }

        .text-truncate {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>

<body>
    <div class="app-layout">
        <!-- SIDEBAR SINISTRA -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="brand-icon">P8</div>
                <span class="brand-text">PZ8</span>
            </div>

            <nav class="nav-menu">
                <li class="nav-item">
                    <button class="nav-btn active" title="Live TV">
                        <i class="ph ph-television"></i>
                        <span class="nav-label">Live</span>
                    </button>
                </li>
                <li class="nav-item">
                    <button class="nav-btn" title="Categorie">
                        <i class="ph ph-list"></i>
                        <span class="nav-label">Categorie</span>
                    </button>
                </li>
                <li class="nav-item">
                    <button class="nav-btn" title="Preferiti">
                        <i class="ph ph-heart"></i>
                        <span class="nav-label">Preferiti</span>
                    </button>
                </li>
                <li class="nav-item">
                    <button class="nav-btn" title="Cronologia">
                        <i class="ph ph-clock-counter-clockwise"></i>
                        <span class="nav-label">Cronologia</span>
                    </button>
                </li>
                <li class="nav-item" style="margin-top: auto;">
                    <button class="nav-btn" title="Impostazioni">
                        <i class="ph ph-gear"></i>
                        <span class="nav-label">Impostazioni</span>

    <script>
        // Performance: Lazy load and optimize animations
        document.addEventListener('DOMContentLoaded', () => {
            // Example: Simulated channel switching
            const channelItems = document.querySelectorAll('.channel-item');
            const channelName = document.querySelector('.channel-name');

            channelItems.forEach(item => {
                item.addEventListener('click', () => {
                    channelItems.forEach(ch => ch.classList.remove('active'));
                    item.classList.add('active');

                    const name = item.querySelector('.channel-name').textContent;
                    channelName.textContent = name;

                    // Simulated player reload
                    const iframe = document.querySelector('iframe');
                    const loader = document.querySelector('.player-loader');
                    
                    iframe.classList.remove('active');
                    loader.style.display = 'flex';

                    setTimeout(() => {
                        loader.style.display = 'none';
                        iframe.classList.add('active');
                    }, 1500);
                });
            });

            // Sidebar navigation
            const navBtns = document.querySelectorAll('.nav-btn');
            navBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    navBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                });
            });

            // Search filter
            const searchInput = document.querySelector('.search-input');
            searchInput?.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                document.querySelectorAll('.channel-item').forEach(item => {
                    const name = item.querySelector('.channel-name').textContent.toLowerCase();
                    item.style.display = name.includes(query) ? '' : 'none';
                });
            });
        });

        // Reduce motion if preferred
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
            document.documentElement.style.setProperty('--animation-duration', '0.01ms');
        }
    </script>
