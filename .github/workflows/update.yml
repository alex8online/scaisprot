name: Aggiorna JSON

on:
  schedule:
    - cron: '*/10 * * * *'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-json:
    runs-on: ubuntu-latest

    steps:
      - name: Clona repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Esegui scraper
        run: python scraper_sky.py

      - name: Commit JSON aggiornato
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add guida_tv_sky.json
          git commit -m "Aggiornamento automatico JSON" || echo "Nessuna modifica"
          git push
